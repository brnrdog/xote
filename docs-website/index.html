<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- GitHub Pages SPA redirect handler -->
  <script>
    (function() {
      var redirect = window.location.search.match(/^\?\/(.*)/);
      if (redirect) {
        var decoded = redirect[1].split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, '',
          '/' + decoded + window.location.hash
        );
      }
    })();
  </script>
  <title>Xote — A ReScript Library for Building User Interfaces</title>
  <meta name="description" content="A small UI library for ReScript with fine-grained reactivity. Signals, computeds, and effects recompute only what changed.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.svg">
