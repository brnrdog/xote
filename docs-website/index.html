<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- GitHub Pages SPA redirect handler -->
  <script>
    (function() {
      var redirect = window.location.search.match(/^\?\/(.*)/);
      if (redirect) {
        var decoded = redirect[1].split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        var basePath = '/xote';
        window.history.replaceState(null, '',
          basePath + '/' + decoded + window.location.hash
        );
      }
    })();
  </script>
  <title>Xote - Reactive UI Library for ReScript</title>
  <meta name="description" content="A lightweight UI library for ReScript that combines fine-grained reactivity with a minimal component system, powered by TC39 Signals.">
  <meta name="theme-color" content="#0f1210">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to content</a>
  <div id="app"><!--ssr-outlet--></div>
  <script type="module" src="/src/EntryClient.res.mjs"></script>
</body>
</html>
