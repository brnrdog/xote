name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: ReScript Build
        run: npm run res:build

      - name: Run tests
        run: node tests/Tests.res.mjs

      - name: Generate sourcemaps
        run: node scripts/generate-sourcemaps.mjs src

      - name: Run tests with coverage
        run: npx c8 --reporter=text --reporter=html --report-dir=coverage node tests/Tests.res.mjs

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Vite Build
        run: npm run build
