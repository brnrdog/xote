name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs-website/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install website dependencies
        run: |
          cd docs-website
          npm ci

      # The docs site uses the @tracked ppx (a native binary built from
      # ppx/ppx.ml during its res:build); ocamlopt is the only build dep.
      - name: Set up OCaml (for @tracked ppx)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ocaml-nox

      - name: Build website
        env:
          SITE_URL: https://xote.dev
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: |
          cd docs-website
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-website/build/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
